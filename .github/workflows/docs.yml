name: Docs agent — update and deploy

# Two-pass auto-documentation pipeline.
#
#   1. Deterministic extractors (scripts/docs/) walk the source tree
#      with the TypeScript compiler API and emit Markdown skeletons that
#      already contain every exported symbol, every signature, every
#      parameter table, every import list, every test name, and every
#      Mermaid dependency diagram. These artifacts are correct by
#      construction — no LLM is involved.
#
#   2. The LLM (claude-code-action, Opus 4.7) only fills <FILL: ...>
#      markers wrapped in <!-- fill:ID --> anchors. Existing filled
#      content survives the regeneration step, so a push that touches one
#      file does not re-bill the LLM for unrelated pages.
#
#   3. A coverage gate verifies every exported symbol has a `## <Name>`
#      section and exits non-zero if anything is missing.
#
# Result: every function is documented, every signature is real, every
# diagram is current, and the LLM only writes prose.

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Re-fill prose for every file (ignores existing anchors)'
        type: boolean
        default: false
  schedule:
    # Weekly self-heal. Push triggers (trigger-docs.yml) cover everyday
    # updates. The cron exists only to catch drift the push triggers miss.
    - cron: '0 8 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            scripts/docs/package-lock.json
            docs-site/package-lock.json

      - name: Determine source scope (incremental hint for the LLM)
        id: scope
        run: |
          MARKER=".github/docs-agent-state"
          FULL="${{ inputs.full_rebuild }}"
          if [ "$FULL" = "true" ] || [ ! -f "$MARKER" ]; then
            MODE="full"; CHANGED=""
          else
            LAST_SHA="$(tr -d '[:space:]' < "$MARKER")"
            if [ -z "$LAST_SHA" ] || ! git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
              MODE="full"; CHANGED=""
            else
              CHANGED="$(git diff --name-only "$LAST_SHA" HEAD -- src server chat-worker || true)"
              if [ -z "$CHANGED" ]; then MODE="full"; else MODE="incremental"; fi
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          {
            echo "changed<<DOCS_EOF"
            echo "$CHANGED"
            echo "DOCS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Source-change mode: $MODE"

      - name: Install docs-toolchain dependencies
        run: |
          cd scripts/docs
          npm ci --no-audit --no-fund

      - name: Discard preserved prose on full rebuild
        # `full_rebuild` means "re-fill every page from scratch". Deleting
        # the auto-generated subtrees before the extractor runs means the
        # snapshot step finds nothing to preserve, so every anchor comes
        # out as a default FILL prompt for the LLM to (re-)write.
        if: inputs.full_rebuild == true
        run: |
          rm -rf docs-site/src/content/docs/frontend
          rm -rf docs-site/src/content/docs/backend
          rm -rf docs-site/src/content/docs/chat-worker
          echo "Full rebuild: cleared auto-generated subtrees."

      - name: Run deterministic extractors (pre-LLM)
        # Always runs. Cheap, deterministic, ~5s. Regenerates skeletons +
        # overviews + Mermaid diagrams from the current source. PRESERVES
        # LLM-filled prose from previous runs via the anchor system, so
        # nothing the LLM wrote gets lost unless the surrounding code
        # changed enough to invalidate the anchor id.
        run: |
          cd scripts/docs
          npm run extract:all

      - name: Decide whether the LLM step is needed
        id: llm
        # Count unfilled FILL prompts remaining in the docs. If zero,
        # everything is already documented and Opus has no work to do.
        # Skipping the LLM step saves the budget for runs that actually
        # change something.
        run: |
          UNFILLED=$(grep -rl '<FILL:' docs-site/src/content/docs/ 2>/dev/null | wc -l | tr -d ' ')
          echo "unfilled_files=$UNFILLED" >> "$GITHUB_OUTPUT"
          if [ "$UNFILLED" -gt 0 ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "$UNFILLED file(s) have unfilled FILL prompts; dispatching the LLM."
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "All FILL prompts are filled; skipping the LLM step."
          fi

      - name: Documentation agent — fill FILL markers
        if: steps.llm.outputs.needed == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          prompt: |
            You are filling in the documentation for this repository.

            The docs are a Starlight (Astro) site under `docs-site/src/content/docs/`.
            A deterministic toolchain has already generated the structure of every
            documentation page — file lists, symbol headings, signatures, parameter
            tables, dependency diagrams, test tables, and the source appendix. You
            must NOT edit any of that. Your only job is to fill in the prose.

            RUN MODE: ${{ steps.scope.outputs.mode }}

            Where to write prose:
            - Each documentation page contains HTML-comment anchors of the form:
                <!-- fill:<id> -->
                <FILL: <prompt for what to write here>>
                <!-- /fill:<id> -->
              Replace the FILL prompt with real prose. Keep the surrounding
              `<!-- fill:ID -->` and `<!-- /fill:ID -->` lines exactly as they
              are. They are how the toolchain preserves your work across reruns.

            - In Markdown tables, some cells contain inline `<FILL: ...>` text
              without anchors. You MUST replace EVERY one of these on EVERY
              file you visit — this is non-negotiable. The complete list of
              where they appear:
                • Per-symbol Parameters table → `Purpose` column
                • Per-component Props table → `Description` column
                • Interface/class Shape/Members table → `Description` column
                • Tests table → `Asserts` column
                • Overview pages: section folder table → `Purpose` column
                • Overview pages: file-list table → `Hint` column
              Each cell needs one specific sentence (~10–25 words) grounded
              in the actual code. "Controls X behaviour" is too vague — say
              what X actually does. Do NOT add `<!-- fill:ID -->` anchors
              around table cells; they break the table renderer.

            What you may write:
            - Plain prose explaining what code does and why it exists.
            - Mermaid diagrams ONLY inside fill anchors marked
              `<!-- fill:file:diagrams -->`. Use ```mermaid fenced blocks. Pick
              the right diagram type for the file: flowchart, sequenceDiagram,
              stateDiagram-v2, classDiagram, or erDiagram.
              If the file is genuinely trivial and a diagram would be invented
              flow rather than informative, fill the anchor with a one-line
              `:::note` instead of leaving it empty. Example:
                  <!-- fill:file:diagrams -->
                  :::note
                  Pure presentational component with a single return — no
                  control flow worth diagramming.
                  :::
                  <!-- /fill:file:diagrams -->
              An EMPTY diagrams anchor is treated as un-filled and you will
              be re-prompted next run. Either draw the diagram or write the
              explicit note.
            - Concrete examples in Examples sections. Pull from tests when
              available so the example reflects real call sites.

            Mermaid syntax — be strict, because a syntax-checking gate runs
            after this step and the workflow fails if any block doesn't parse:
            - Inside a `flowchart`, edges are `-->`, `-.->`, `==>`. The
              sequence-diagram arrow `-->>` is NOT valid in a flowchart.
            - Wrap EVERY node label in double quotes when it contains any
              special character — `[`, `]`, `{`, `}`, `(`, `)`, `<`, `>`,
              `:`, `/`, `\`, `|`, or commas. Example: write
              `A["points: number[]"]`, NOT `A[points: number[]]`.
            - In pipe-edge labels `--|"…"|`, also use DOUBLE quotes. Single
              quotes do not escape the contents. Avoid `{` and `}` inside
              edge labels — replace `"{ a, b }"` with `"JSON: a, b"` or
              similar.
            - For comparisons inside labels, escape `<` as `&lt;` and `>`
              as `&gt;`. Example: `{"points.length &lt; 2?"}`.
            - In `sequenceDiagram` blocks, `-->>` and `->>` are valid; the
              flowchart restriction does not apply there.

            What you must NOT do:
            - Do NOT touch anything outside fill anchors and table FILL cells.
            - Do NOT edit headings, signatures, code blocks, tables (except for
              the FILL cells described above), the Imports table, the Source
              appendix, the Symbols table, the Used by list, or anything inside
              `<!-- fill:*-deps -->` / `<!-- fill:*-tree -->`-style auto-generated
              blocks (those exist as Mermaid blocks marked with `%% Auto-generated`).
            - Do NOT touch existing fill content that already has real prose
              (anything that does not start with `<FILL:` and end with `>`).
            - Do NOT create or delete files.
            - Do NOT touch the hand-curated pages: `index.md`, `getting-started.md`,
              `testing.md`, or `architecture.md`.
            - Do NOT write to any directory that starts with a digit (those are
              frozen archived versions). Only write under
              `docs-site/src/content/docs/frontend/`,
              `docs-site/src/content/docs/backend/`, or
              `docs-site/src/content/docs/chat-worker/`.

            If RUN MODE is "incremental":
              Only these source files changed since the docs were last updated.
              Open the docs page for each one and fill its anchors.

              ---
              ${{ steps.scope.outputs.changed }}
              ---

            If RUN MODE is "full":
              Walk every doc page under the three sections above and fill every
              anchor whose content is still a default `<FILL: ...>` prompt. Skip
              anchors whose content is already real prose.

            Depth bar (this is the most important instruction):
            - For each function/component/hook, every line of the line-by-line
              walkthrough must be filled with a precise explanation of that
              specific statement. Do not summarise the whole function in one
              walkthrough cell — explain each statement on its own line.
            - Return-value FILLs must say what the value represents, when it
              can be null/undefined, units, and any failure modes.
            - File-summary FILLs must reference the file's collaborators by
              name (other documented files).
            - Folder/section overview FILLs must reference the diagrams above
              them and the most important entry points.
            - Examples must be real and runnable, not vague templates.

            Figma designs from merged pull requests (optional, best-effort):
            - The marker file `.github/docs-agent-state` holds the commit SHA the
              docs were last built from. Get that commit's date with:
              `git show -s --format=%cI <SHA>`
            - List PRs merged since:
              `gh pr list --state merged --base main --search "merged:>=<date>" --json number --limit 100`
              On a "full" run, list all merged PRs (omit the search).
            - For each PR description containing a `figma.com` URL:
              - Export the design with `mcp__figma__download_figma_images`
                into `docs-site/public/figma/`.
              - Embed it on the documentation pages for the source files that
                PR changed, using a full absolute https://… URL.
              - Add a short caption beneath the image.
            - If gh or Figma fails, add a `:::caution` note inside the relevant
              fill anchor rather than guessing.

            Starlight formatting:
            - Every Markdown file ALREADY has frontmatter. Do not edit it.
            - For callouts, use `:::note`, `:::tip`, `:::caution`, `:::danger`.

            Be accurate. Base every statement on the actual code. If something
            is unclear, write a `:::caution` note inside the fill anchor.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 300
            --mcp-config '{"mcpServers":{"figma":{"command":"npx","args":["-y","figma-developer-mcp","--stdio"]}}}'
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash,mcp__figma__get_figma_data,mcp__figma__download_figma_images"

      - name: Coverage gate
        # Every exported symbol must have a `## <Name>` section in the
        # corresponding doc page. If not, the LLM dropped something and
        # we want to know loudly rather than ship a doc with holes.
        run: |
          cd scripts/docs
          npm run check:coverage

      - name: Mermaid syntax gate
        # Validates every ```mermaid block with Mermaid's own parser
        # (mermaid.parse) via a jsdom shim — same parser the browser
        # uses at render time, no headless Chromium needed. Catches the
        # class of bug that the Astro build does not — the Starlight
        # build is happy with malformed mermaid, but the page renders
        # "Syntax error in text" at runtime in the browser. Most common
        # offender: Opus writing `[]` inside a `[]` label, bare `<` in a
        # node label, or `-->>` (sequence-diagram syntax) inside a flowchart.
        run: |
          cd scripts/docs
          npm run check:mermaid

      - name: Commit documentation updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git rev-parse HEAD > .github/docs-agent-state
          mkdir -p docs-site/public/figma
          git config user.name "docs-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs-site/src/content/docs docs-site/public/figma .github/docs-agent-state)" ]; then
            git add docs-site/src/content/docs docs-site/public/figma .github/docs-agent-state
            git commit -m "docs: automated update by the documentation agent"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main || echo "Push skipped; continuing to build and deploy."
          else
            echo "No documentation changes to commit."
          fi

      - name: Build the docs site
        run: |
          cd docs-site
          npm ci --no-audit --no-fund
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
