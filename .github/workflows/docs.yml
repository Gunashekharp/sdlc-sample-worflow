name: Docs agent — update and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */10 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List changed files (merge runs only)
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || true)
            else
              FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            fi
          else
            FILES=""
          fi
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run the documentation agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You maintain the documentation for this repository. The docs are
            MkDocs Markdown files in the `docs/` folder.

            This run was triggered by: ${{ github.event_name }}

            Files changed in the merge that triggered this run (may be empty):
            ${{ steps.diff.outputs.files }}

            How to work:
            - If the changed-files list above is NON-EMPTY, this is an
              incremental run. Read those changed source files and update only
              the `docs/` pages they affect.
            - If the changed-files list is EMPTY (a manual or daily run), do a
              full review: read the repository and make sure every page in
              `docs/` is accurate and complete. Fill gaps and fix stale content.

            Rules:
            - Keep edits factual and surgical. Never invent behaviour.
            - If something is unclear, add a short `!!! warning "Needs review"`
              admonition instead of guessing.
            - If nothing in `docs/` needs to change, make no edits.
            - Do not edit anything outside the `docs/` folder.

            Style: clear, present tense, short paragraphs. Use Material
            admonitions (`!!! note`, `!!! warning`) for callouts.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Commit documentation updates
        run: |
          if git diff --quiet -- docs; then
            echo "No documentation changes were needed."
          else
            git config user.name  "docs-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "docs: automated update by the documentation agent"
            git push origin HEAD:main
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the docs site
        run: |
          pip install -r docs-requirements.txt
          mkdocs build --strict --site-dir _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
