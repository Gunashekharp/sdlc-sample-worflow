name: Docs agent — update and deploy

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Document the entire codebase from scratch'
        type: boolean
        default: false
  schedule:
    - cron: '0 */10 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine documentation scope
        id: scope
        run: |
          MARKER=".github/docs-agent-state"
          FULL="${{ inputs.full_rebuild }}"
          if [ "$FULL" = "true" ] || [ ! -f "$MARKER" ]; then
            MODE="full"; CHANGED=""
          else
            LAST_SHA="$(tr -d '[:space:]' < "$MARKER")"
            if [ -z "$LAST_SHA" ] || ! git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
              MODE="full"; CHANGED=""
            else
              CHANGED="$(git diff --name-only "$LAST_SHA" HEAD -- src server || true)"
              if [ -z "$CHANGED" ]; then MODE="none"; else MODE="incremental"; fi
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          {
            echo "changed<<DOCS_EOF"
            echo "$CHANGED"
            echo "DOCS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

      - name: Run the documentation agent
        if: steps.scope.outputs.mode != 'none'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the documentation agent for this repository. The docs are
            MkDocs Markdown pages in the `docs/` folder.

            RUN MODE: ${{ steps.scope.outputs.mode }}

            If RUN MODE is "full":
              Do a complete, exhaustive pass. Read every source file under
              `src/` and `server/src/`, the config files, the package.json
              files and the tests. Produce deeply detailed documentation
              covering every module, component, API endpoint, workflow and
              configuration. Give each significant area its own page under
              `docs/` (grouped in folders such as `docs/backend/` and
              `docs/frontend/`) and add new pages to the `nav:` list in
              `mkdocs.yml`, keeping the existing YAML indentation exactly.

            If RUN MODE is "incremental":
              Only these source files changed since the docs were last updated:
              ---
              ${{ steps.scope.outputs.changed }}
              ---
              Read those changed files, understand what changed, and update
              ONLY the documentation pages those changes affect. Do not rewrite
              unrelated pages. If a change introduces something with no page
              yet, create a new page and add it to the `nav:` in `mkdocs.yml`.

            In both modes:
            - Be precise and accurate. Base every statement on the actual code.
              Never invent behaviour. If something is genuinely ambiguous, add a
              brief `!!! warning "Needs review"` note instead of guessing.
            - Write clear, detailed prose with exact file paths, function names,
              data shapes, edge cases and concrete code examples.
            - Use Material formatting: `!!! note` / `!!! warning` admonitions,
              tables, fenced code blocks, and `mermaid` diagrams.
            - Only edit Markdown files in `docs/` and the `nav:` section of
              `mkdocs.yml`. Do not modify source code or workflow files.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 120
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Commit documentation updates
        if: steps.scope.outputs.mode != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git rev-parse HEAD > .github/docs-agent-state
          git config user.name "docs-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs mkdocs.yml .github/docs-agent-state)" ]; then
            git add docs mkdocs.yml .github/docs-agent-state
            git commit -m "docs: automated update by the documentation agent"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main || echo "Push skipped; continuing to build and deploy."
          else
            echo "No documentation changes to commit."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the docs site
        run: |
          pip install -r docs-requirements.txt
          mkdocs build --site-dir _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
