name: Docs agent — update and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */10 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run the documentation agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You maintain the documentation for this repository. The docs are
            MkDocs Markdown files in the `docs/` folder.

            Do a full review: read the repository and make sure every page in
            `docs/` is accurate and complete. Fill gaps and fix stale content.

            Rules:
            - Keep edits factual and surgical. Never invent behaviour.
            - If something is unclear, add a short `!!! warning "Needs review"`
              admonition instead of guessing.
            - If nothing in `docs/` needs to change, make no edits.
            - Do not edit anything outside the `docs/` folder.

            Style: clear, present tense, short paragraphs. Use Material
            admonitions (`!!! note`, `!!! warning`) for callouts.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Read,Edit,Write,Grep,Glob"

      - name: Commit documentation updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "docs-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs)" ]; then
            git add docs
            git commit -m "docs: automated update by the documentation agent"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main || echo "Push skipped; continuing to build and deploy."
          else
            echo "No documentation changes to commit."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the docs site
        run: |
          pip install -r docs-requirements.txt
          mkdocs build --site-dir _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
