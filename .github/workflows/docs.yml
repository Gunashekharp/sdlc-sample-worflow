name: Docs agent — update and deploy

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Document the entire codebase from scratch'
        type: boolean
        default: false
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine documentation scope
        id: scope
        run: |
          MARKER=".github/docs-agent-state"
          FULL="${{ inputs.full_rebuild }}"
          if [ "$FULL" = "true" ] || [ ! -f "$MARKER" ]; then
            MODE="full"; CHANGED=""
          else
            LAST_SHA="$(tr -d '[:space:]' < "$MARKER")"
            if [ -z "$LAST_SHA" ] || ! git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
              MODE="full"; CHANGED=""
            else
              CHANGED="$(git diff --name-only "$LAST_SHA" HEAD -- src server || true)"
              if [ -z "$CHANGED" ]; then MODE="none"; else MODE="incremental"; fi
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          {
            echo "changed<<DOCS_EOF"
            echo "$CHANGED"
            echo "DOCS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

      - name: Run the documentation agent
        if: steps.scope.outputs.mode != 'none'
        uses: anthropics/claude-code-action@v1
        env:
          FIGMA_API_KEY: ${{ secrets.FIGMA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You maintain the documentation for this repository. The docs are a
            Starlight (Astro) site. The documentation pages are Markdown files
            in `docs-site/src/content/docs/`.

            RUN MODE: ${{ steps.scope.outputs.mode }}

            If RUN MODE is "full":
              Read the entire repository — every source file under `src/` and
              `server/src/`, the config files and the tests. Produce deep,
              exhaustive reference documentation — not high-level summaries.
              Give every source file its own page, and on that page:
              - Document EVERY function, method, class, React component,
                hook, type and exported constant in the file. Skip nothing.
              - For each one, give the full signature, every parameter (name,
                type, purpose), the return value, any errors thrown and any
                side effects.
              - Walk through the implementation in depth: explain the logic
                block by block, and line by line wherever the code is
                non-obvious. Quote the relevant source lines in fenced code
                blocks as you explain them.
              - Call out edge cases, assumptions and how each piece connects
                to the rest of the codebase.
              Organise pages into subfolders inside
              `docs-site/src/content/docs/` that mirror the source tree (for
              example `frontend/` and `backend/`); the sidebar is generated
              automatically from the folder structure.

            If RUN MODE is "incremental":
              Only these source files changed since the docs were last updated:
              ---
              ${{ steps.scope.outputs.changed }}
              ---
              Read them and update the documentation pages they affect, to
              the same depth as a full run: re-document every function,
              method, class, component and type in each changed file, with
              full signatures, parameters, return values and a line-by-line
              walkthrough of any non-obvious logic.

            Diagrams — the docs site renders Mermaid, so use it heavily:
            - Write each diagram as a fenced code block with the language
              set to mermaid; the site renders these automatically as
              pictures.
            - Add diagrams to every page where they aid understanding, and
              prefer a diagram over long prose for anything structural.
            - Use `sequenceDiagram` for request flows, authentication, data
              synchronisation and any multi-step interaction between
              components or services.
            - Use `flowchart TD` for control flow, decision logic and
              processes.
            - Give the system an overall architecture diagram: a `flowchart`
              showing the React frontend, the Express API, the PostgreSQL
              database and any external services, with the connections
              between them.
            - Render the database schema as an `erDiagram` showing entities,
              columns and relationships.
            - Use `stateDiagram-v2` for components with distinct states and
              `classDiagram` for important module or class relationships.
            - Keep Mermaid syntax valid and reasonably simple. If a diagram
              would be guesswork, add a `:::caution` note instead.

            Figma designs from merged pull requests:
            - The marker file `.github/docs-agent-state` holds the commit SHA
              the docs were last built from. Get that commit's date with:
              `git show -s --format=%cI <SHA>`
            - Using the GitHub CLI (`gh`, authenticated by the GH_TOKEN
              environment variable), list pull requests merged into `main`
              since that date:
              `gh pr list --state merged --base main --search "merged:>=<date>" --json number --limit 100`
              On a "full" run, list all merged PRs instead (omit the search).
            - For each merged PR, read its description and changed files:
              `gh pr view <number> --json number,title,body,files`
            - Scan each PR description for Figma links — any URL containing
              `figma.com`. For every Figma link found:
              - Export the design with `mcp__figma__download_figma_images`
                into `docs-site/public/figma/` as a PNG; use
                `mcp__figma__get_figma_data` for detail to describe it.
              - Embed it on the documentation page(s) for the SOURCE files
                that same PR changed (files under `src/` or `server/src/`):
                ![<short caption>](/sdlc-sample-worflow/figma/<name>.png)
                The `/sdlc-sample-worflow` prefix is required or the image
                404s. Add a short written description below the image.
            - A PR with no Figma link just has its changed code documented
              as usual — there is no design to embed.
            - If a Figma call or a gh call fails, add a `:::caution` note
              rather than guessing or inventing a design.

            Strict formatting rules for Starlight:
            - EVERY Markdown file must begin with frontmatter, exactly:
              ---
              title: <the page title>
              ---
            - For callouts use Starlight asides, not MkDocs syntax:
              `:::note`, `:::tip`, `:::caution` or `:::danger`, each closed by
              a line containing only `:::`.
            - Use standard Markdown headings, tables and fenced code blocks.
            - Create or edit Markdown files inside
              `docs-site/src/content/docs/`, and design images inside
              `docs-site/public/figma/`. Never edit source code, the
              workflow, or any other file under `docs-site/`.

            Be accurate — base every statement on the actual code. If something
            is unclear, add a `:::caution` note rather than guessing.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 200
            --mcp-config '{"mcpServers":{"figma":{"command":"npx","args":["-y","figma-developer-mcp","--stdio"]}}}'
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash,mcp__figma__get_figma_data,mcp__figma__download_figma_images"

      - name: Commit documentation updates
        if: steps.scope.outputs.mode != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git rev-parse HEAD > .github/docs-agent-state
          mkdir -p docs-site/public/figma
          git config user.name "docs-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs-site/src/content/docs docs-site/public/figma .github/docs-agent-state)" ]; then
            git add docs-site/src/content/docs docs-site/public/figma .github/docs-agent-state
            git commit -m "docs: automated update by the documentation agent"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main || echo "Push skipped; continuing to build and deploy."
          else
            echo "No documentation changes to commit."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build the docs site
        run: |
          cd docs-site
          npm install
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
