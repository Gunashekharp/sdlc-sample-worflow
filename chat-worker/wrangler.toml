# Cloudflare Worker config for the docs chatbot backend.
# Deploy with:  npm install && npm run deploy
name = "snabbit-docs-chatbot"
main = "src/index.js"
compatibility_date = "2026-05-01"

# The Worker calls the Anthropic API (Claude Haiku 4.5) to write answers.
# The API key is stored as an encrypted Wrangler secret, NOT in this file:
#   npx wrangler secret put ANTHROPIC_API_KEY
# The model is set by MODEL in src/index.js.
