site_name: Snabbit Agent Console — Docs
site_description: Documentation for the Snabbit Agent Console
site_url: https://gunashekharp.github.io/sdlc-sample-worflow/

theme:
  name: material
  icon:
    logo: material/robot-outline
  features:
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Frontend:
    - Overview: frontend/index.md
    - Components: frontend/components.md
    - Library & hooks: frontend/lib.md
    - Data & types: frontend/data.md
    - Styling & design tokens: frontend/styling.md
    - Testing: frontend/testing.md
  - Backend:
    - Overview: backend/index.md
    - Configuration: backend/configuration.md
    - App & routes: backend/app-and-routes.md
    - Data stores: backend/stores.md
    - Database: backend/database.md
    - CI/CD integration: backend/cicd-integration.md
    - Testing: backend/testing.md
  - API reference: api-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
